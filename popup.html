<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 280px;
      padding: 8px;
      font-family: Helvetica, system-ui, -apple-system, Arial, sans-serif;
      background: #ffffff;
      color: #000;
      border: 2px solid #2f7d23;
      margin: 0;
    }
    h2 {
      text-align: center;
      margin: 0 0 5px;
      color: #000000;
    }
    h4 {
      text-align: center;
      margin: 0 0 8px;
      color: #000000;
    }
    label {
      font-weight: bold;
      display: block;
      margin: 8px 0 4px;
    }
    input, select {
      width: 100%;
      padding: 5px;
      box-sizing: border-box;
      font-size: 12px;
      border-radius: 8px;
      border: 1px solid #2f7d23;
      outline: none;
      width: 100%;
      color: #000000;
    }
    label {
      color: #000000;
    }
    select {
      cursor: pointer;
    }
    #result {
      margin-top: 12px;
      font-size: 20px;
      font-weight: bold;
      text-align: center;
      color: #2f7d23;
      background: #f3f3f3;
      padding: 10px;
      min-height: 20px;
      word-break: break-word;
      border: 1px solid #90be7e;
    }
    .image-container {
      display: flex;
      justify-content: center;
      margin-bottom: 5px;
    }
    .error {
      color: #d00;
      font-size: 14px;
    }
    .saveBtn-container {
      display: flex;
      justify-content: flex-end;
    }
    #saveBtn {
      display: block;
      margin: 6px 0px 0px 6px;
      width: auto;
      padding: 4px 10px;
      font-size: 10px;
      background: #2f7d23;
      border: 1px solid #90be7e;
      border-radius: 8px;
      cursor: pointer;
      color: #FFF
    }
    #saveBtn:disabled {
      background: #cccccc;
      border-color: #cccccc;
      cursor: default;
    }
    #historyBox {
      margin-top: 14px;
      border-top: 1px solid #2f7d23;
      padding-top: 8px;
    }
    #historyBox h4 {
      margin: 0 0 6px;
      font-size: 13px;
    }
    #historyList {
      list-style: none;
      padding: 0;
      margin: 0;
      font-size: 13px;
    }
    #historyList li {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 4px 0;
      border-bottom: 1px dotted #eeeeee;
    }
    #historyList li:last-child {
      border-bottom: none;
    }
    .history-item {
      flex: 1;
    }
    .delete-btn {
      background: none;
      border: none;
      color: #c00;
      font-size: 14px;
      cursor: pointer;
      padding: 0 4px;
      margin-left: 6px;
      width: auto;
    }
    .delete-btn:hover {
      color: #900;
    }
    /* Chrome, Safari, Edge, Opera */
    input::-webkit-outer-spin-button,
    input::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    /* Firefox */
    input[type=number] {
      -moz-appearance: textfield;
      appearance: textfield;
    }
  </style>
</head>
<body>
  <div class="image-container">
    <img src="icons/icon48.png"/>
  </div>
  <h2>Conversor de Moedas</h2>

  <label for="amount">Valor:</label>
  <input type="number" id="amount" placeholder="Ex: 100,00" autofocus>

  <label for="fromCurrency">De:</label>
  <select id="fromCurrency"></select>

  <label for="toCurrency">Para:</label>
  <select id="toCurrency"></select>

  <div id="result"></div>

  <div class="saveBtn-container">
    <button id="saveBtn" disabled title="Salvar esta cotação no histórico">Salvar</button>
  </div>

  <div id="historyBox">
    <h4>Últimas conversões salvas</h4>
    <ul id="historyList"></ul>
  </div>

  <script src="currencies.js"></script>
  <script src="popup.js"></script>
</body>
</html>
